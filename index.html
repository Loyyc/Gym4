<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PPL Tracker">
<meta name="theme-color" content="#1a1a1a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>PPL Tracker</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f4;
    --bg3: #eeede9;
    --text: #1a1a1a;
    --text2: #6b6b68;
    --text3: #9c9a92;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --blue: #185FA5;
    --blue-bg: #E6F1FB;
    --blue-text: #0C447C;
    --green: #0F6E56;
    --green-bg: #E1F5EE;
    --green-text: #085041;
    --amber: #854F0B;
    --amber-bg: #FAEEDA;
    --amber-text: #633806;
    --teal: #1D9E75;
    --red: #A32D2D;
    --radius: 12px;
    --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --bg2: #2c2c2e;
      --bg3: #3a3a3c;
      --text: #f2f2f0;
      --text2: #a0a09a;
      --text3: #6e6e6a;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --blue-bg: #0c2d4a;
      --blue-text: #85B7EB;
      --green-bg: #042d22;
      --green-text: #5DCAA5;
      --amber-bg: #2d1c04;
      --amber-text: #FAC775;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; padding-top: var(--safe-top); }
  
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 14px 16px 0;
    padding-top: calc(var(--safe-top) + 14px);
  }
  .topbar-title { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
  .tabs { display: flex; gap: 0; }
  .tab { flex: 1; text-align: center; padding: 8px 4px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; transition: all .15s; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }

  .content { padding: 16px; padding-bottom: calc(var(--safe-bot) + 80px); }
  .view { display: none; }
  .view.active { display: block; }

  .day-pills { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
  .day-pills::-webkit-scrollbar { display: none; }
  .pill { padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); white-space: nowrap; transition: all .15s; }
  .pill.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .exo-card { background: var(--bg2); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
  .exo-header { padding: 13px 15px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .exo-title { font-size: 15px; font-weight: 600; }
  .exo-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .chev { font-size: 18px; color: var(--text3); transition: transform .2s; }
  .chev.open { transform: rotate(180deg); }
  .exo-body { padding: 0 15px 14px; }

  .suggest { padding: 9px 12px; border-radius: var(--radius-sm); margin-bottom: 12px; font-size: 13px; }
  .suggest.up { background: var(--green-bg); color: var(--green-text); }
  .suggest.hold { background: var(--bg3); color: var(--text2); }

  .series-header { display: grid; grid-template-columns: 36px 1fr 1fr 36px; gap: 8px; margin-bottom: 6px; }
  .col-lbl { font-size: 11px; font-weight: 600; color: var(--text3); text-align: center; text-transform: uppercase; letter-spacing: .05em; }
  .series-row { display: grid; grid-template-columns: 36px 1fr 1fr 36px; gap: 8px; align-items: center; margin-bottom: 8px; }
  .s-num { font-size: 13px; font-weight: 600; color: var(--text2); text-align: center; }
  .s-input { background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 9px 8px; font-size: 15px; color: var(--text); text-align: center; width: 100%; -webkit-appearance: none; }
  .s-input:focus { outline: none; border-color: var(--blue); }
  .del-btn { width: 32px; height: 32px; border-radius: 50%; background: var(--bg3); border: none; color: var(--text3); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .add-series { width: 100%; padding: 9px; border-radius: var(--radius-sm); border: 0.5px dashed var(--border2); background: none; color: var(--text2); font-size: 13px; cursor: pointer; margin-top: 4px; }

  .save-btn { width: 100%; padding: 15px; border-radius: var(--radius); border: none; background: var(--text); color: var(--bg); font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 16px; transition: opacity .15s; }
  .save-btn:active { opacity: .75; transform: scale(.98); }

  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--bg2); border-radius: var(--radius-sm); padding: 14px 10px; text-align: center; }
  .stat-val { font-size: 24px; font-weight: 700; }
  .stat-lbl { font-size: 11px; color: var(--text2); margin-top: 3px; }

  .section-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .hist-item { background: var(--bg2); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; }
  .hist-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .hist-day { font-size: 14px; font-weight: 600; }
  .hist-date { font-size: 12px; color: var(--text2); }
  .hist-detail { font-size: 12px; color: var(--text2); line-height: 1.5; }

  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }

  .prog-select { width: 100%; padding: 11px 14px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 14px; margin-bottom: 16px; -webkit-appearance: none; }
  .chart-section { background: var(--bg2); border-radius: var(--radius); padding: 14px; margin-bottom: 14px; }
  .chart-title { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: .05em; }
  canvas { width: 100% !important; }

  .toast { position: fixed; bottom: calc(var(--safe-bot) + 90px); left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; }

  @media (prefers-color-scheme: dark) {
    .s-input { background: var(--bg3); }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">PPL Tracker</div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('log')">Enregistrer</button>
    <button class="tab" onclick="switchTab('history')">Historique</button>
    <button class="tab" onclick="switchTab('progress')">Progression</button>
  </div>
</div>

<div class="content">
  <div id="view-log" class="view active">
    <div class="day-pills" style="margin-top:14px">
      <button class="pill active" onclick="selectDay('push',this)">Lundi · Push</button>
      <button class="pill" onclick="selectDay('pull',this)">Mercredi · Pull</button>
      <button class="pill" onclick="selectDay('legs',this)">Vendredi · Legs</button>
    </div>
    <div id="exo-list"></div>
    <button class="save-btn" onclick="saveSession()">Sauvegarder la séance</button>
  </div>

  <div id="view-history" class="view">
    <div class="stat-grid" id="stats-grid" style="margin-top:14px"></div>
    <div class="section-title">Séances récentes</div>
    <div id="hist-list"></div>
  </div>

  <div id="view-progress" class="view" style="margin-top:14px">
    <select class="prog-select" id="prog-exo-select" onchange="renderCharts()"></select>
    <div class="chart-section">
      <div class="chart-title">Charge maximale (kg)</div>
      <canvas id="chart-weight" height="160"></canvas>
    </div>
    <div class="chart-section">
      <div class="chart-title">Volume total (kg × reps)</div>
      <canvas id="chart-vol" height="160"></canvas>
    </div>
  </div>
</div>

<div class="toast" id="toast">Séance sauvegardée ✓</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const EXERCISES = {
  push: [
    {id:'bench',name:'Développé couché barre',target:'4×6-8',inc:2.5},
    {id:'incline',name:'Développé incliné haltères',target:'3×10-12',inc:2},
    {id:'ohp',name:'Développé militaire haltères',target:'3×8-10',inc:2},
    {id:'lateral',name:'Élévations latérales',target:'3×15',inc:2},
    {id:'dips',name:'Dips',target:'3×10-12',inc:2.5},
    {id:'tricep',name:'Extension triceps poulie',target:'3×12-15',inc:2.5},
  ],
  pull: [
    {id:'pullup',name:'Tractions pronation',target:'5×3',bodyweight:true},
    {id:'rdl',name:'Soulevé de terre roumain',target:'3×10',inc:5},
    {id:'row',name:'Tirage horizontal barre',target:'3×10-12',inc:2.5},
    {id:'pullover',name:'Pull-over poulie haute',target:'3×12',inc:2.5},
    {id:'curl',name:'Curl haltères',target:'3×10-12',inc:2},
    {id:'hammer',name:'Curl marteau',target:'2×12',inc:2},
  ],
  legs: [
    {id:'squat',name:'Squat barre',target:'4×6-8',inc:5},
    {id:'press',name:'Presse à cuisses',target:'3×10-12',inc:5},
    {id:'lunge',name:'Fentes marchées haltères',target:'3×12/jambe',inc:2},
    {id:'abduct',name:'Abduction machine',target:'3×15',inc:5},
    {id:'legcurl',name:'Leg curl couché',target:'3×12',inc:5},
    {id:'calf',name:'Mollets debout',target:'4×15-20',inc:5},
  ]
};

let currentDay = 'push';
let sessions = JSON.parse(localStorage.getItem('ppl_sessions') || '[]');
let seriesCounts = JSON.parse(localStorage.getItem('ppl_series_counts') || '{}');
let charts = {};

function save() {
  localStorage.setItem('ppl_sessions', JSON.stringify(sessions));
  localStorage.setItem('ppl_series_counts', JSON.stringify(seriesCounts));
}

function getLastExoData(exoId) {
  for (let i = sessions.length - 1; i >= 0; i--) {
    const ex = (sessions[i].exercises || []).find(e => e.id === exoId);
    if (ex && ex.sets.length) return ex;
  }
  return null;
}

function parseTargetSeries(target) {
  const m = target.match(/^(\d+)/);
  return m ? parseInt(m[1]) : 3;
}

function parseTargetReps(target) {
  const m = target.match(/×(\d+)/);
  return m ? parseInt(m[1]) : 10;
}

function getSuggestion(ex) {
  const last = getLastExoData(ex.id);
  if (!last) return null;
  if (ex.bodyweight) {
    const total = last.sets.map(s => s.reps).join(' / ');
    return { type: 'hold', text: `Dernière : ${total} reps — vise +1 rep sur ta 1ère série` };
  }
  const targetReps = parseTargetReps(ex.target);
  const lastSet = last.sets[last.sets.length - 1];
  const allHitTarget = last.sets.every(s => s.reps >= targetReps);
  if (allHitTarget && ex.inc) {
    return { type: 'up', text: `Progression possible → ${lastSet.weight + ex.inc} kg` };
  }
  return { type: 'hold', text: `Maintiens ${lastSet.weight} kg — vise ${targetReps} reps sur toutes les séries` };
}

function renderLog() {
  const exos = EXERCISES[currentDay];
  const list = document.getElementById('exo-list');
  list.innerHTML = '';
  exos.forEach(ex => {
    const count = seriesCounts[ex.id] || parseTargetSeries(ex.target);
    const last = getLastExoData(ex.id);
    const sug = getSuggestion(ex);
    let sugHtml = '';
    if (sug) sugHtml = `<div class="suggest ${sug.type}">${sug.type === 'up' ? '↑ ' : ''}${sug.text}</div>`;
    let rows = '';
    for (let i = 0; i < count; i++) {
      const lw = last?.sets?.[i]?.weight || (last?.sets?.[last.sets.length-1]?.weight || '');
      const lr = last?.sets?.[i]?.reps || '';
      rows += `<div class="series-row" id="row-${ex.id}-${i}">
        <div class="s-num">S${i+1}</div>
        <input class="s-input" type="number" inputmode="decimal" placeholder="${lw||'kg'}" id="w-${ex.id}-${i}" step="0.5" min="0">
        <input class="s-input" type="number" inputmode="numeric" placeholder="${lr||'reps'}" id="r-${ex.id}-${i}" step="1" min="0">
        <button class="del-btn" onclick="removeSeries('${ex.id}')" aria-label="Supprimer">−</button>
      </div>`;
    }
    const card = document.createElement('div');
    card.className = 'exo-card';
    card.innerHTML = `
      <div class="exo-header" onclick="toggleExo('${ex.id}')">
        <div>
          <div class="exo-title">${ex.name}</div>
          <div class="exo-meta">Cible : ${ex.target}${ex.bodyweight ? ' · Poids de corps' : ''}</div>
        </div>
        <div class="chev" id="chev-${ex.id}">⌄</div>
      </div>
      <div class="exo-body" id="body-${ex.id}" style="display:none">
        ${sugHtml}
        <div class="series-header">
          <div></div>
          <div class="col-lbl">Charge kg</div>
          <div class="col-lbl">Reps</div>
          <div></div>
        </div>
        <div id="series-${ex.id}">${rows}</div>
        <button class="add-series" onclick="addSeries('${ex.id}')">+ Ajouter une série</button>
      </div>`;
    list.appendChild(card);
  });
}

function toggleExo(id) {
  const body = document.getElementById('body-' + id);
  const chev = document.getElementById('chev-' + id);
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  chev.classList.toggle('open', !open);
}

function addSeries(exoId) {
  seriesCounts[exoId] = (seriesCounts[exoId] || parseTargetSeries(EXERCISES[currentDay].find(e=>e.id===exoId)?.target||'3')) + 1;
  const wasOpen = document.getElementById('body-' + exoId).style.display !== 'none';
  renderLog();
  if (wasOpen) { document.getElementById('body-' + exoId).style.display = 'block'; document.getElementById('chev-' + exoId).classList.add('open'); }
}

function removeSeries(exoId) {
  const ex = EXERCISES[currentDay].find(e => e.id === exoId);
  const def = parseTargetSeries(ex?.target || '3');
  const cur = seriesCounts[exoId] || def;
  if (cur > 1) {
    seriesCounts[exoId] = cur - 1;
    const wasOpen = document.getElementById('body-' + exoId).style.display !== 'none';
    renderLog();
    if (wasOpen) { document.getElementById('body-' + exoId).style.display = 'block'; document.getElementById('chev-' + exoId).classList.add('open'); }
  }
}

function saveSession() {
  const exos = EXERCISES[currentDay];
  const result = [];
  exos.forEach(ex => {
    const count = seriesCounts[ex.id] || parseTargetSeries(ex.target);
    const sets = [];
    for (let i = 0; i < count; i++) {
      const w = parseFloat(document.getElementById('w-' + ex.id + '-' + i)?.value || 0);
      const r = parseInt(document.getElementById('r-' + ex.id + '-' + i)?.value || 0);
      if (w || r) sets.push({ weight: w, reps: r });
    }
    if (sets.length) result.push({ id: ex.id, name: ex.name, sets });
  });
  if (!result.length) return;
  sessions.push({ day: currentDay, date: new Date().toISOString(), exercises: result });
  save();
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
  renderLog();
}

function selectDay(day, btn) {
  currentDay = day;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  renderLog();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById('view-' + tab).classList.add('active');
  if (tab === 'history') renderHistory();
  if (tab === 'progress') { renderProgressSelect(); renderCharts(); }
}

function renderHistory() {
  const dL = { push: 'Push', pull: 'Pull', legs: 'Legs' };
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-val">${sessions.length}</div><div class="stat-lbl">Séances</div></div>
    <div class="stat-card"><div class="stat-val">${sessions.filter(s=>s.day==='legs').length}</div><div class="stat-lbl">Legs</div></div>
    <div class="stat-card"><div class="stat-val">${[...new Set(sessions.map(s=>new Date(s.date).toDateString()))].length}</div><div class="stat-lbl">Jours actifs</div></div>`;
  const hl = document.getElementById('hist-list');
  if (!sessions.length) { hl.innerHTML = '<div class="empty">Aucune séance enregistrée.</div>'; return; }
  hl.innerHTML = sessions.slice().reverse().slice(0, 30).map(s => {
    const d = new Date(s.date);
    const ds = d.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
    const detail = (s.exercises || []).map(e => {
      const best = Math.max(...e.sets.map(x => x.weight || 0));
      const reps = e.sets.reduce((a, x) => a + x.reps, 0);
      return `${e.name.split(' ').slice(0, 3).join(' ')} — ${best > 0 ? best + 'kg' : 'pdc'} · ${reps} reps`;
    }).join('<br>');
    return `<div class="hist-item"><div class="hist-top"><div class="hist-day">${dL[s.day] || s.day}</div><div class="hist-date">${ds}</div></div><div class="hist-detail">${detail}</div></div>`;
  }).join('');
}

function renderProgressSelect() {
  const sel = document.getElementById('prog-exo-select');
  const all = [...EXERCISES.push, ...EXERCISES.pull, ...EXERCISES.legs];
  sel.innerHTML = all.map(e => `<option value="${e.id}">${e.name}</option>`).join('');
}

function renderCharts() {
  const exoId = document.getElementById('prog-exo-select').value;
  const data = sessions.filter(s => (s.exercises || []).some(e => e.id === exoId)).map(s => {
    const ex = s.exercises.find(e => e.id === exoId);
    const best = Math.max(...ex.sets.map(x => x.weight || 0));
    const vol = ex.sets.reduce((a, x) => a + (x.weight || 0) * x.reps, 0);
    return { label: new Date(s.date).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' }), best, vol: Math.round(vol) };
  });
  const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const tc = dark ? '#a0a09a' : '#6b6b68';
  const gc = dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  const baseOpts = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: gc }, ticks: { color: tc, font: { size: 11 } } }, y: { grid: { color: gc }, ticks: { color: tc, font: { size: 11 } }, beginAtZero: false } } };
  ['chart-weight', 'chart-vol'].forEach(id => { if (charts[id]) charts[id].destroy(); });
  charts['chart-weight'] = new Chart(document.getElementById('chart-weight'), { type: 'line', data: { labels: data.map(d => d.label), datasets: [{ data: data.map(d => d.best), borderColor: '#185FA5', backgroundColor: 'rgba(55,138,221,0.1)', tension: .3, pointRadius: 4, fill: true, borderWidth: 2 }] }, options: baseOpts });
  charts['chart-vol'] = new Chart(document.getElementById('chart-vol'), { type: 'bar', data: { labels: data.map(d => d.label), datasets: [{ data: data.map(d => d.vol), backgroundColor: 'rgba(29,158,117,0.7)', borderColor: '#0F6E56', borderWidth: 1, borderRadius: 4 }] }, options: baseOpts });
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

renderLog();
</script>
</body>
</html>
